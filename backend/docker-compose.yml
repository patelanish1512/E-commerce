version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: amazon_clone_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: AmazonCloneDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: amazon_clone_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
